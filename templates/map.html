<!-- interactive map page -->
{% extends "base.html" %}
{% block title %}Hazard Map{% endblock %}
{% block content %}
    <h1>Hazard Map — Gurgaon</h1>

    <!-- Leaflet's stylesheet. NOT optional — without it tiles misalign and the zoom controls look broken. loaded from the unpkg CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- the map container. height in vh = % of viewport → fills most of the screen and stays responsive on resize. (% wouldn't work — needs a sized parent) -->
    <div id="map" style="height: 85vh;"></div>

    <!-- Leaflet's JS. defines the global L object our code uses below. must load BEFORE our script runs -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- our map code. sits at the END of content, AFTER the #map div → the div already exists when this runs. the head-script null gotcha, dodged -->
    <script>
        // create the map, bind it to <div id="map">, center on Gurgaon, zoom 12
        // [lat, lng] order — Leaflet's convention. swap them and the pin lands off the coast of Somalia
        const map = L.map("map").setView([28.4595, 77.0266], 12);

        // add the actual imagery: OpenStreetMap tiles. {z}/{x}/{y} get filled in per visible tile as you pan/zoom
        // attribution is REQUIRED by OSM's usage policy — and just good manners
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);

        // real reports from the DB. tojson serializes the Python list of dicts → a safe JS array (handles all escaping)
        const reportMarkers = {{ markers | tojson }};

        // loop in PURE JS — not Jinja emitting L.marker() calls. data crossed as data; JS builds the markers
        reportMarkers.forEach(function (r) {
            L.marker([r.lat, r.lng])
                .addTo(map)
                .bindPopup(r.hazard_type + " — " + r.status);   // popup shows what + current status
        });
    </script>
{% endblock %}

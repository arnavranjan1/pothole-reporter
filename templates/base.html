<!-- basic template every page follows -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- adjusts for mobile -->
    <title> {% block title %} Pothole Reporter {% endblock %} </title>
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}">Home</a> |
        <a href="{{ url_for('report') }}">Report a Hazard</a> |
        <a href="{{ url_for('reports') }}">All Reports </a>
    </nav>
    <hr> <!-- creates horizontal line -->
    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
